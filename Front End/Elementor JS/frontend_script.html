<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ============================================================
     0. INJECT TRANSITION STYLES
     All step animation CSS lives here — no external stylesheet needed.
  ============================================================ */
  const styleEl = document.createElement("style");
  styleEl.textContent = `
    /* Base step styles */
    .step-managed {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: transform, opacity;
      pointer-events: none;
    }
    .step-managed.step-active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    /* Slide-up variant for forward navigation */
    .step-managed.step-from-below {
      transform: translateY(18px);
    }
    /* Slide-down variant for back navigation */
    .step-managed.step-from-above {
      transform: translateY(-10px);
    }
    /* Loading pulse on preview image during processing */
    #loading-image-preview {
      animation: none;
    }
    #loading-image-preview.is-loading {
      animation: imgPulse 1.6s ease-in-out infinite;
    }
    @keyframes imgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    /* Upload button micro-states */
    #upload-button {
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    #upload-button:not(:disabled):hover  { opacity: 0.88; }
    #upload-button:not(:disabled):active { transform: scale(0.97); }
    #upload-button:disabled { cursor: not-allowed; }
    /* Result video fade-in */
    #result-video video {
      transition: opacity 0.5s ease;
    }
    #result-video video.video-hidden { opacity: 0; }
    #result-video video.video-visible { opacity: 1; }
    /* Generic btn micro-animation */
    .btn-action {
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .btn-action:hover  { opacity: 0.85; }
    .btn-action:active { transform: scale(0.97); }
  `;
  document.head.appendChild(styleEl);


  /* ============================================================
     1. ENVIRONMENT CHECK
  ============================================================ */
  const isEditor = document.body.classList.contains("elementor-editor-active");


  /* ============================================================
     2. CACHE ALL DOM ELEMENTS (query once, reuse everywhere)
  ============================================================ */
  const DOM = {
    step02:              document.getElementById("step-02"),
    step03:              document.getElementById("step-03"),
    step04:              document.getElementById("step-04"),
    step05:              document.getElementById("step-05"),
    step06:              document.getElementById("step-06"),

    btnNhapTiec:         document.getElementById("btn-nhap-tiec"),
    dropZone:            document.getElementById("drop-zone"),
    fileInput:           document.getElementById("file-input"),
    imagePreview:        document.getElementById("image-preview"),
    placeholder:         document.getElementById("placeholder"),
    confirmCheckbox:     document.getElementById("confirm-checkbox"),
    uploadButton:        document.getElementById("upload-button"),
    btnTryAgain:         document.getElementById("btn-try-again"),

    step5Loading:        document.getElementById("step5-loading"),
    loadingImagePreview: document.getElementById("loading-image-preview"),

    resultVideo:         document.getElementById("result-video"),
    btnDownload:         document.getElementById("btn-download"),
    btnShare:            document.getElementById("btn-share"),
    imgPersonality:      document.getElementById("img-personality"),

    btnOver18:           document.getElementById("btn-over-18"),
    btnCloseZaloPopup:   document.getElementById("btn-close-pop-up-zalo"),
  };


  /* ============================================================
     3. APPLICATION STATE
  ============================================================ */
  let state = {
    selectedFile:    null,
    currentVideoUrl: "",
    transitioning:   false,   // lock to prevent mid-animation clicks
  };

  async function getFreshNonce() {
    try {
      const res = await fetch('/wp-json/faceswap/v1/token');
      if (!res.ok) return window.LH_FACESWAP_NONCE || '';
      const data = await res.json();
      window.LH_FACESWAP_NONCE = data.token; // also update the cached value
      return data.token;
    } catch {
      return window.LH_FACESWAP_NONCE || '';
    }
  }
	
	// ================== FILE SIZE LIMIT (20MB) ==================
  const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB - đồng bộ với backend

  /* ============================================================
     4. STEP TRANSITION ENGINE
     switchToStep(targetId, direction?)
       direction: "forward" (default) | "back"
     - Fades out the currently active step
     - Fades in the target step with a subtle slide
  ============================================================ */
  const ALL_STEP_IDS = ["step-02", "step-03", "step-04", "step-05", "step-06"];

  function initStepStyles() {
    ALL_STEP_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add("step-managed");
      // Keep original display mode (flex) stored so we can restore it
      el.dataset.displayMode = el.style.display || "flex";
      el.style.display = "none";
    });
  }

  function switchToStep(targetId, direction = "forward") {
    if (state.transitioning) return;

    const targetEl = document.getElementById(targetId);
    if (!targetEl) return;

    // Find currently visible step
    const currentEl = ALL_STEP_IDS
      .map(id => document.getElementById(id))
      .find(el => el && el.style.display !== "none" && el !== targetEl);

    // Determine slide direction class
    const enterClass = direction === "back" ? "step-from-above" : "step-from-below";

    state.transitioning = true;

    function showTarget() {
      // Prep target: position off-screen (below or above), make visible but transparent
      targetEl.classList.add(enterClass);
      targetEl.classList.remove("step-active");
      targetEl.style.display = targetEl.dataset.displayMode || "flex";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          targetEl.classList.remove(enterClass);
          targetEl.classList.add("step-active");

          // Unlock after transition completes
          targetEl.addEventListener("transitionend", () => {
            state.transitioning = false;
          }, { once: true });
        });
      });
    }

    if (currentEl) {
      // Fade out current step
      currentEl.classList.remove("step-active");
      currentEl.addEventListener("transitionend", () => {
        currentEl.style.display = "none";
        showTarget();
      }, { once: true });
    } else {
      // No current step — just show target directly
      showTarget();
    }
  }

  /* Convenience: show one step instantly (for initial load) */
  function showStepInstant(targetId) {
    ALL_STEP_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = "none";
      el.classList.remove("step-active");
    });
    const targetEl = document.getElementById(targetId);
    if (!targetEl) return;
    targetEl.style.display = targetEl.dataset.displayMode || "flex";
    // Small rAF so the element paints before adding active class
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        targetEl.classList.add("step-active");
      });
    });
  }


  /* ============================================================
     5. INITIAL SETUP
  ============================================================ */
  if (!isEditor) {
    initStepStyles();
    showStepInstant("step-02");
  }


  /* ============================================================
     6. BUTTON STATE UTILITY
     setButtonState(btn, 'loading' | 'disabled' | 'enabled' | 'success', label?)
  ============================================================ */
  function setButtonState(btn, stateType, label) {
    if (!btn) return;
    switch (stateType) {
      case "loading":
        btn.disabled = true;
        btn.style.opacity = "0.7";
        btn.style.cursor = "wait";
        if (label) btn.innerHTML = label;
        break;
      case "disabled":
        btn.disabled = true;
        btn.style.opacity = "";
        btn.style.cursor = "";
        if (label) btn.innerHTML = label;
        break;
      case "enabled":
        btn.disabled = false;
        btn.style.opacity = "";
        btn.style.cursor = "";
        if (label) btn.innerHTML = label;
        break;
      case "success":
        btn.disabled = true;
        btn.style.opacity = "0.6";
        btn.style.cursor = "default";
        if (label) btn.innerHTML = label;
        break;
    }
  }


  /* ============================================================
     IMAGE RESIZE — Nén ảnh xuống max 1024px trước khi upload
     - Giữ tỉ lệ gốc (không méo ảnh)
     - Nếu ảnh đã nhỏ hơn 1024px → vẫn re-encode để giảm dung lượng
     - Output: JPEG quality 0.85 (PNG có alpha → nền trắng)
     - HEIC/HEIF: nếu browser không decode được → fallback gửi file gốc
  ============================================================ */
  const MAX_DIMENSION = 1024;
  const JPEG_QUALITY  = 0.85;

  function resizeImage(file) {
    return new Promise((resolve) => {
      const img = new Image();
      const objectUrl = URL.createObjectURL(file);

      img.onload = () => {
        URL.revokeObjectURL(objectUrl);
        let { width, height } = img;

        const needsResize = width > MAX_DIMENSION || height > MAX_DIMENSION;
        if (needsResize) {
          const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
          width  = Math.round(width  * ratio);
          height = Math.round(height * ratio);
        }

        const canvas = document.createElement("canvas");
        canvas.width  = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");

        // Nền trắng cho ảnh có alpha (PNG → JPEG)
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(
          (blob) => {
            if (!blob) { resolve(file); return; }
            const originalName = file.name.replace(/\.[^/.]+$/, "");
            resolve(new File([blob], `${originalName}.jpg`, {
              type: "image/jpeg",
              lastModified: Date.now(),
            }));
          },
          "image/jpeg",
          JPEG_QUALITY
        );
      };

      img.onerror = () => {
        // HEIC trên Chrome/Firefox không decode được → gửi file gốc
        URL.revokeObjectURL(objectUrl);
        console.warn("[Resize] Không decode được ảnh, gửi file gốc:", file.name);
        resolve(file);
      };

      img.src = objectUrl;
    });
  }

  async function handleFile(file) {
    if (!file) return;

    // === 1. KIỂM TRA DUNG LƯỢNG ===
    if (file.size > MAX_FILE_SIZE) {
      const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
      alert(`❌ File quá lớn!\n\nDung lượng file: ${sizeMB} MB\nGiới hạn tối đa: 20 MB\n\nVui lòng chọn file nhỏ hơn.`);
      if (DOM.fileInput) DOM.fileInput.value = "";
      return;
    }

    // === 2. KIỂM TRA ĐỊNH DẠNG ===
    if (!file.type.startsWith("image/")) {
      alert("Vui lòng chọn file hình ảnh!");
      if (DOM.fileInput) DOM.fileInput.value = "";
      return;
    }

    // === 3. RESIZE XUỐNG MAX 1024px (giữ tỉ lệ) ===
    if (DOM.placeholder) DOM.placeholder.style.opacity = "0.5";

    let processedFile;
    try {
      processedFile = await resizeImage(file);
      console.log(
        `[Resize] ${file.name}: ${(file.size/1024).toFixed(0)}KB → ${(processedFile.size/1024).toFixed(0)}KB`
      );
    } catch (err) {
      console.error("[Resize] Error:", err);
      processedFile = file;
    } finally {
      if (DOM.placeholder) DOM.placeholder.style.opacity = "";
    }

    // File hợp lệ — lưu file đã nén
    state.selectedFile = processedFile;
    const reader = new FileReader();
    reader.onload = e => {
      if (DOM.placeholder)    DOM.placeholder.style.display = "none";
      if (DOM.imagePreview) {
        DOM.imagePreview.src          = e.target.result;
        DOM.imagePreview.style.display = "block";
        void DOM.imagePreview.offsetWidth;
        DOM.imagePreview.style.opacity = "1";
      }
    };
    reader.readAsDataURL(processedFile);
    syncUploadButton();
  }

  function syncUploadButton() {
    const ready = !!(state.selectedFile && DOM.confirmCheckbox?.checked);
    if (DOM.uploadButton) DOM.uploadButton.disabled = !ready;
  }

  function resetUploadForm() {
    state.selectedFile = null;
    if (DOM.fileInput) {
      DOM.fileInput.value = "";
      DOM.fileInput.style.pointerEvents = "auto";
    }
    if (DOM.placeholder)    DOM.placeholder.style.display = "flex";
    if (DOM.imagePreview) {
      DOM.imagePreview.style.display = "none";
      DOM.imagePreview.src           = "";
      DOM.imagePreview.style.opacity = "";
    }
    if (DOM.confirmCheckbox) DOM.confirmCheckbox.checked = false;
    setButtonState(DOM.uploadButton, "disabled", "TẢI ẢNH LÊN");
    // Stop loading pulse
    if (DOM.loadingImagePreview) DOM.loadingImagePreview.classList.remove("is-loading");
  }

  function cloneFormData(original) {
    const cloned = new FormData();
    for (const [key, value] of original.entries()) cloned.append(key, value);
    return cloned;
  }

  if (DOM.dropZone) {
    DOM.fileInput.addEventListener("change", e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    DOM.dropZone.addEventListener("dragover",  e => { e.preventDefault(); DOM.dropZone.classList.add("dragover"); });
    DOM.dropZone.addEventListener("dragleave", ()  => DOM.dropZone.classList.remove("dragover"));
    DOM.dropZone.addEventListener("drop", e => {
      e.preventDefault();
      DOM.dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
  }

  if (DOM.confirmCheckbox) DOM.confirmCheckbox.addEventListener("change", syncUploadButton);


  /* ============================================================
     8. STEP NAVIGATION — SIMPLE CLICK EVENTS
  ============================================================ */
  if (DOM.btnNhapTiec) {
    DOM.btnNhapTiec.addEventListener("click", e => {
      e.preventDefault();
      switchToStep("step-03");
    });
  }

  if (DOM.btnTryAgain) {
    DOM.btnTryAgain.addEventListener("click", () => {
      resetUploadForm();
      switchToStep("step-03", "back");
    });
  }


  /* ============================================================
     9. SHOW STEP-06: RESULT
     Pre-loads the video before fading the step in for a smooth reveal.
  ============================================================ */
  function showStep06(result) {
    if (!result) return;

    // Update personality image if present
    if (result["img-personality"] && DOM.imgPersonality) {
      DOM.imgPersonality.src    = result["img-personality"];
      DOM.imgPersonality.srcset = "";
    }

    // Pre-load video, then reveal step-06
    if (result.video_url) {
      state.currentVideoUrl = result.video_url;
      const videoEl = DOM.resultVideo?.querySelector("video.elementor-video");

      if (videoEl) {
        // Hide while loading
        videoEl.classList.add("video-hidden");
        videoEl.classList.remove("video-visible");
        videoEl.pause();
        videoEl.src         = result.video_url;
        videoEl.currentTime = 0;
        videoEl.load();

        const revealVideo = () => {
          videoEl.classList.remove("video-hidden");
          videoEl.classList.add("video-visible");
        };

        // Fade in once browser has enough data to play
        videoEl.addEventListener("canplay", revealVideo, { once: true });
        // Fallback: reveal after 3s regardless
        setTimeout(revealVideo, 3000);
      } else {
        console.error("showStep06: <video.elementor-video> not found inside #result-video");
      }
    }

    // Stop loading pulse, transition to step-06
    if (DOM.loadingImagePreview) DOM.loadingImagePreview.classList.remove("is-loading");
    if (DOM.step5Loading)        DOM.step5Loading.style.display = "none";
    switchToStep("step-06");
  }


  /* ============================================================
     10. MAIN UPLOAD FLOW (v1.8 — Async + Polling)
         POST 1: /check  → sync, nhanh (~5s)
         POST 2: /swap   → trả job_id ngay (< 2s), không chờ n8n
         POLL:   /status?job=xxx  mỗi 5s cho đến khi done/error
  ============================================================ */
  const PROXY_CHECK_URL  = "/wp-json/faceswap/v1/check";
  const PROXY_SWAP_URL   = "/wp-json/faceswap/v1/swap";
  const PROXY_STATUS_URL = "/wp-json/faceswap/v1/status";

  const POLL_INTERVAL_MS = 5000;   // Poll mỗi 5 giây
  const POLL_MAX_WAIT_MS = 900000; // Timeout tổng tối đa 15 phút

  /* Hàm poll kết quả swap cho đến khi done hoặc timeout */
  async function pollSwapResult(jobId) {
    const startTime = Date.now();

    return new Promise((resolve, reject) => {
      async function tick() {
        // Kiểm tra timeout tổng
        if (Date.now() - startTime > POLL_MAX_WAIT_MS) {
          reject(new Error("Quá thời gian chờ (15 phút). Vui lòng thử lại."));
          return;
        }

        try {
          const res = await fetch(`${PROXY_STATUS_URL}?job=${encodeURIComponent(jobId)}`);

          if (res.status === 404) {
            reject(new Error("Job không tồn tại hoặc đã hết hạn."));
            return;
          }
          if (!res.ok) {
            // Lỗi tạm thời — thử lại sau
            setTimeout(tick, POLL_INTERVAL_MS);
            return;
          }

          const data = await res.json();

          if (data.status === "done") {
            resolve(data);
          } else if (data.status === "error") {
            reject(new Error(data.reason || "Face swap thất bại."));
          } else {
            // Vẫn đang pending — poll tiếp
            setTimeout(tick, POLL_INTERVAL_MS);
          }
        } catch (err) {
          // Lỗi network tạm thời — thử lại
          setTimeout(tick, POLL_INTERVAL_MS);
        }
      }

      tick();
    });
  }

  if (DOM.uploadButton) {
    DOM.uploadButton.addEventListener("click", async () => {
      if (!state.selectedFile) return;

      if (state.selectedFile.size > MAX_FILE_SIZE) {
        alert("❌ File quá lớn! Vui lòng chọn file dưới 20MB.");
        resetUploadForm();
        return;
      }

      setButtonState(DOM.uploadButton, "loading", "Đang kiểm tra...");

      const formData = new FormData();
      formData.append("file",    state.selectedFile);
      formData.append("confirm", "1");

      try {
        /* ── Step 1: Check ảnh (sync) ── */
        const nonce = await getFreshNonce();
        const checkRes = await fetch(PROXY_CHECK_URL, {
          method: "POST",
          headers: { 'X-LH-Faceswap-Nonce': nonce },
          body: cloneFormData(formData)
        });
        if (!checkRes.ok) throw new Error(`Check server error: ${checkRes.status}`);
        let checkResult = await checkRes.json();
        
        // Unwrap mảng nếu server trả về [{...}] thay vì object
        if (Array.isArray(checkResult)) checkResult = checkResult[0];

        if (checkResult.success !== true) {
          alert("❌ " + (checkResult.reason || "Ảnh không phù hợp!"));
          resetUploadForm();
          switchToStep("step-04");
          return;
        }

        /* ── Step 2: Hiện loading, chuyển step 5 ── */
        if (DOM.step5Loading) DOM.step5Loading.style.display = "block";
        if (DOM.loadingImagePreview && DOM.imagePreview?.src) {
          DOM.loadingImagePreview.src = DOM.imagePreview.src;
          DOM.loadingImagePreview.classList.add("is-loading");
        }
        switchToStep("step-05");
        setButtonState(DOM.uploadButton, "loading", "Đang xử lý...");

        /* ── Step 3: Gửi swap — nhận job_id ngay (< 2s) ── */
        const swapRes = await fetch(PROXY_SWAP_URL, {
          method: "POST",
          headers: { 'X-LH-Faceswap-Nonce': nonce },
          body: formData
        });
        if (!swapRes.ok) throw new Error(`Swap server error: ${swapRes.status}`);
        let swapInit = await swapRes.json();
        // n8n Respond to Webhook trả về array [{...}] — unwrap nếu cần
        if (Array.isArray(swapInit)) swapInit = swapInit[0];

        if (!swapInit?.job_id) {
          throw new Error("Không nhận được job ID từ server.");
        }

        /* ── Step 4: Poll kết quả mỗi 5 giây ── */
        const swapResult = await pollSwapResult(swapInit.job_id);

        if (swapResult.success && swapResult.video_url) {
          showStep06(swapResult);
        } else {
          throw new Error(swapResult.reason || "Face swap thất bại – không có video_url.");
        }

      } catch (err) {
        console.error("Upload error:", err);
        alert("❌ Có lỗi xảy ra. Vui lòng thử lại!\n" + err.message);
        resetUploadForm();
        if (DOM.step5Loading) DOM.step5Loading.style.display = "none";
        switchToStep("step-03", "back");

      } finally {
        setButtonState(DOM.uploadButton, "enabled", "TẢI ẢNH LÊN");
        syncUploadButton();
      }
    });
  }


  /* ============================================================
     11. DOWNLOAD & SHARE
  ============================================================ */
  async function handleDownload() {
    if (!state.currentVideoUrl) { alert("❌ Chưa có video để tải. Vui lòng thử lại!"); return; }

    setButtonState(DOM.btnDownload, "loading");
    try {
      const res  = await fetch(state.currentVideoUrl, { method: "GET", mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob    = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a       = Object.assign(document.createElement("a"), { href: blobUrl, download: "TADAAAA-video-cua-ban.mp4" });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    } catch (err) {
      console.error("Download error:", err);
      alert("❌ Không thể tải video.\nLỗi: " + err.message);
    } finally {
      setButtonState(DOM.btnDownload, "enabled");
    }
  }

  function handleShare() {
    if (!state.currentVideoUrl) { alert("❌ Chưa có video để chia sẻ. Vui lòng thử lại!"); return; }
    window.open(
      `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(state.currentVideoUrl)}`,
      "_blank", "width=600,height=700"
    );
  }

  if (DOM.btnDownload) DOM.btnDownload.addEventListener("click", handleDownload);
  if (DOM.btnShare)    DOM.btnShare.addEventListener("click", handleShare);


  /* ============================================================
     12. PHONE FORM SUBMISSION (reusable for both inline & popup)
  ============================================================ */
  const PHONE_WEBHOOK_URL = "/wp-json/faceswap/v1/phone";   // ← proxy
  const VN_PHONE_REGEX    = /^(0|84|\+84)[35789][0-9]{8}$/;

  function setupPhoneSubmission(btnId, inputId, messageId) {
    const btnSend      = document.getElementById(btnId);
    const phoneInput   = document.getElementById(inputId);
    const phoneMessage = document.getElementById(messageId);
    if (!btnSend || !phoneInput || !phoneMessage) return;

    function showMsg(msg, type = "error") {
      phoneMessage.textContent = msg;
      phoneMessage.style.color = type === "success" ? "#28a745" : "#d9534f";
      if (type === "error") {
        setTimeout(() => {
          if (phoneMessage.textContent === msg) phoneMessage.textContent = "";
        }, 6000);
      }
    }

    btnSend.addEventListener("click", async e => {
      e.preventDefault();
      const raw   = phoneInput.value.trim().replace(/\s+/g, "");
      if (!raw) { showMsg("Vui lòng nhập số điện thoại!"); phoneInput.focus(); return; }
      if (!VN_PHONE_REGEX.test(raw)) {
        showMsg("Số điện thoại không hợp lệ! Vui lòng nhập đúng số di động.");
        phoneInput.focus();
        return;
      }

      const formatted  = raw.replace(/^(\+?84)/, "0");
      const origLabel  = btnSend.innerHTML;
      setButtonState(btnSend, "loading", `<span class="spinner-border spinner-border-sm" role="status"></span> Đang gửi...`);

      const formData = new FormData();
      formData.append("phone",  formatted);
      formData.append("source", btnId === "btn-send-2" ? "tadadaa_video_popup" : "tadadaa_video_form");
      formData.append("confirm", "1");
      if (state.currentVideoUrl) formData.append("video_url", state.currentVideoUrl);

      try {
        const nonce = await getFreshNonce();
        const res = await fetch(PHONE_WEBHOOK_URL, {
            method: "POST",
            headers: {
                'X-LH-Faceswap-Nonce': nonce
            },
            body: formData
        });
        let result = await res.json();
        if (Array.isArray(result)) result = result[0];

        if (result?.status === "success" || result?.success === true) {
          showMsg("✅ Gửi thành công! Quà tặng sẽ được gửi qua Zalo trong vài phút.", "success");
          phoneInput.disabled = true;
          setButtonState(btnSend, "success", "THÀNH CÔNG");
        } else if (result?.status === "error") {
          showMsg(`❌ ${result.message || result.reason || "Gửi thất bại"}`);
          setButtonState(btnSend, "enabled", origLabel);
        } else {
          throw new Error(result?.message || result?.reason || "Phản hồi không xác định");
        }
      } catch (err) {
        console.error("Phone submit error:", err);
        showMsg("❌ Có lỗi xảy ra khi gửi. Vui lòng thử lại sau!");
        setButtonState(btnSend, "enabled", origLabel);
      }
    });
  }

  setupPhoneSubmission("btn-send", "phone-input", "phone-message");


  /* ============================================================
     13. AGE GATE & ZALO POPUP
  ============================================================ */
  if (DOM.btnOver18) {
    DOM.btnOver18.addEventListener("click", () => document.body.classList.add("age-verified"));
  }

  if (typeof jQuery !== "undefined") {
    jQuery(document).on("elementor/popup/hide", (event, id) => {
      if (id === 1487) document.body.classList.add("age-verified");
    });

    jQuery(document).on("elementor/popup/show", (event, id) => {
      if (id === 2302) {
        // Small delay to let popup DOM fully render before querying its children
        setTimeout(() => setupPhoneSubmission("btn-send-2", "phone-input-2", "phone-message-2"), 400);
      }
    });
  }

  if (DOM.btnCloseZaloPopup) {
    DOM.btnCloseZaloPopup.addEventListener("click", () => {
      if (typeof elementorFrontend !== "undefined") {
        elementorFrontend.elements.$body.trigger("elementor/popup/hide", [2302]);
      } else {
        const popup = document.querySelector('[data-elementor-id="2302"]');
        if (popup) popup.style.display = "none";
      }
    });
  }

}); // end DOMContentLoaded
</script>
