<script>
  document.addEventListener("DOMContentLoaded", () => {

    /* ================== LOAD FACEBOOK SDK ================== */
    (function (d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/vi_VN/sdk.js#xfbml=1&version=v19.0&appId=991207586610170&autoLogAppEvents=1";
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));

    /* ============================================================
       0. INJECT TRANSITION STYLES
       All step animation CSS lives here — no external stylesheet needed.
    ============================================================ */
    const styleEl = document.createElement("style");
    styleEl.textContent = `
    /* Base step styles */
    .step-managed {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: transform, opacity;
      pointer-events: none;
    }
    .step-managed.step-active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    /* Slide-up variant for forward navigation */
    .step-managed.step-from-below {
      transform: translateY(18px);
    }
    /* Slide-down variant for back navigation */
    .step-managed.step-from-above {
      transform: translateY(-10px);
    }
    /* Loading pulse on preview image during processing */
    #loading-image-preview {
      animation: none;
    }
    #loading-image-preview.is-loading {
      animation: imgPulse 1.6s ease-in-out infinite;
    }
    @keyframes imgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    /* Upload button micro-states */
    #upload-button {
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    #upload-button:not(:disabled):hover  { opacity: 0.88; }
    #upload-button:not(:disabled):active { transform: scale(0.97); }
    #upload-button:disabled { cursor: not-allowed; }
    /* Result video fade-in */
    #result-video video {
      transition: opacity 0.5s ease;
    }
    #result-video video.video-hidden { opacity: 0; }
    #result-video video.video-visible { opacity: 1; }
    /* Result image preview (quick image before video) */
    /* #result-image là Elementor widget DIV — ẩn bằng opacity thay vì display:none
       để tránh xung đột với Elementor absolute positioning */
    /* #result-image là Elementor widget DIV — ẩn bằng opacity thay vì display:none */
    #result-image {
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #result-image.visible {
      opacity: 1;
      pointer-events: auto;
    }
    /* Đảm bảo .elementor-widget-container có position relative để overlay anchor đúng */
    #result-image .elementor-widget-container {
      position: relative !important;
    }
    /* BW reveal overlay — inject vào TRONG .elementor-widget-container, trùm lên <img> */
    #result-image .bw-reveal-overlay {
      position: absolute !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 999 !important;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #result-image .bw-reveal-overlay.bw-show {
      opacity: 1;
    }
    #result-image .bw-reveal-overlay.bw-fade-out {
      opacity: 0;
    }
    #result-image .bw-reveal-overlay img {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      object-fit: contain !important;
      display: block !important;
      margin: 0 !important;
    }
    /* Subtle breath effect */
    #result-image .bw-reveal-overlay.bw-show img {
      animation: bwBreath 1.2s ease-in-out infinite;
    }
    @keyframes bwBreath {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.88; transform: scale(1.015); }
    }
    /* result-video container hidden until user clicks */
    #result-video.video-section-hidden { display: none !important; }
    /* btn-get-video disabled state */
    #btn-get-video:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-get-video.video-ready { animation: pulseReady 1.4s ease-in-out 3; }
    @keyframes pulseReady {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    /* Status hint below image in step-06 */
    #video-status-hint {
      font-size: 0.82em;
      opacity: 0.7;
      margin-top: 6px;
      text-align: center;
    }
    /* Generic btn micro-animation */
    .btn-action {
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .btn-action:hover  { opacity: 0.85; }
    .btn-action:active { transform: scale(0.97); }

    /* ============================================================
       INTRO COVERFLOW — 6 silhouette (Apple-style)
    ============================================================ */
    #intro {
      display: none;
      position: relative;
      width: 100%;
      min-height: 75vh;
      padding: 50px 0 40px;
      opacity: 0;
      transform: translateX(-60px);
      transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
      pointer-events: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      perspective: 2200px;
      -webkit-perspective: 2200px;
    }
    /* "ready" = đã display:flex nhưng chưa active → đợi rAF rồi mới slide-in */
    #intro.intro-ready {
      display: flex;
    }
    #intro.intro-active {
      display: flex;
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    /* Step-03 fade-out class — dùng song song với intro fade-in */
    #step-03.step-fading-out {
      opacity: 0 !important;
      transform: translateX(40px) !important;
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) !important;
      pointer-events: none !important;
    }
    .intro-stage {
      position: relative;
      width: 100%;
      max-width: 1100px;
      height: 620px;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      margin: 0 auto;
    }
    .intro-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 540px;
      margin: -270px 0 0 -160px;
      transform-origin: center center;
      transition: transform 0.7s cubic-bezier(0.22, 0.61, 0.36, 1),
                  opacity 0.7s ease,
                  filter 0.7s ease;
      will-change: transform, opacity, filter;
      opacity: 0;
      filter: brightness(0.5) blur(3px);
      pointer-events: none;
    }
    .intro-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    /* Positions: center, left-1, left-2 (hidden far), right-1, right-2 (hidden far) */
    .intro-card.pos-center {
      transform: translate3d(0, 0, 200px) rotateY(0deg) scale(1.15);
      opacity: 1;
      filter: brightness(1) blur(0);
      z-index: 5;
    }
    .intro-card.pos-left-1 {
      transform: translate3d(-320px, 0, 0) rotateY(40deg) scale(0.85);
      opacity: 0.75;
      filter: brightness(0.7) blur(0.5px);
      z-index: 3;
    }
    .intro-card.pos-right-1 {
      transform: translate3d(320px, 0, 0) rotateY(-40deg) scale(0.85);
      opacity: 0.75;
      filter: brightness(0.7) blur(0.5px);
      z-index: 3;
    }
    .intro-card.pos-left-2 {
      transform: translate3d(-540px, 0, -180px) rotateY(52deg) scale(0.6);
      opacity: 0.35;
      filter: brightness(0.5) blur(2px);
      z-index: 1;
    }
    .intro-card.pos-right-2 {
      transform: translate3d(540px, 0, -180px) rotateY(-52deg) scale(0.6);
      opacity: 0.35;
      filter: brightness(0.5) blur(2px);
      z-index: 1;
    }
    .intro-card.pos-hidden {
      transform: translate3d(0, 0, -400px) rotateY(0deg) scale(0.4);
      opacity: 0;
      filter: brightness(0.3) blur(6px);
      z-index: 0;
    }
    /* Caption text */
    .intro-caption {
      margin-top: 40px;
      max-width: 90%;
      text-align: center;
      font-size: clamp(18px, 2.6vw, 30px);
      line-height: 1.45;
      color: #fff;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    }
    #intro.intro-active .intro-caption {
      opacity: 1;
      transform: translateY(0);
    }
    .intro-caption .intro-line-1 { display: block; }
    .intro-caption .intro-line-2 {
      display: block;
      margin-top: 8px;
      color: #ffd700;
    }
    /* ==================== TABLET (768-1024px) ==================== */
    @media (max-width: 1024px) {
      #intro { min-height: 65vh; padding: 35px 0 30px; }
      .intro-stage { max-width: 800px; height: 480px; }
      .intro-card {
        width: 240px; height: 400px;
        margin: -200px 0 0 -120px;
      }
      .intro-card.pos-center {
        transform: translate3d(0, 0, 150px) rotateY(0deg) scale(1.12);
      }
      .intro-card.pos-left-1 {
        transform: translate3d(-220px, 0, 0) rotateY(40deg) scale(0.83);
      }
      .intro-card.pos-right-1 {
        transform: translate3d(220px, 0, 0) rotateY(-40deg) scale(0.83);
      }
      .intro-card.pos-left-2 {
        transform: translate3d(-380px, 0, -140px) rotateY(52deg) scale(0.58);
      }
      .intro-card.pos-right-2 {
        transform: translate3d(380px, 0, -140px) rotateY(-52deg) scale(0.58);
      }
      .intro-caption { margin-top: 30px; font-size: clamp(16px, 3vw, 24px); }
    }
    /* ==================== MOBILE (max 767px) ==================== */
    @media (max-width: 767px) {
      #intro { min-height: 55vh; padding: 25px 0 20px; perspective: 1200px; }
      .intro-stage { height: 340px; max-width: 100%; }
      .intro-card {
        width: 160px; height: 280px;
        margin: -140px 0 0 -80px;
      }
      .intro-card.pos-center {
        transform: translate3d(0, 0, 100px) rotateY(0deg) scale(1.1);
      }
      .intro-card.pos-left-1 {
        transform: translate3d(-130px, 0, 0) rotateY(38deg) scale(0.82);
      }
      .intro-card.pos-right-1 {
        transform: translate3d(130px, 0, 0) rotateY(-38deg) scale(0.82);
      }
      .intro-card.pos-left-2 {
        transform: translate3d(-220px, 0, -110px) rotateY(50deg) scale(0.55);
      }
      .intro-card.pos-right-2 {
        transform: translate3d(220px, 0, -110px) rotateY(-50deg) scale(0.55);
      }
      .intro-caption { margin-top: 22px; font-size: clamp(14px, 4vw, 18px); }
    }
  `;
    document.head.appendChild(styleEl);


    /* ============================================================
       1. ENVIRONMENT CHECK
    ============================================================ */
    const isEditor = document.body.classList.contains("elementor-editor-active");


    /* ============================================================
       2. CACHE ALL DOM ELEMENTS (query once, reuse everywhere)
    ============================================================ */
    const DOM = {
      step02: document.getElementById("step-02"),
      step03: document.getElementById("step-03"),
      step04: document.getElementById("step-04"),
      step05: document.getElementById("step-05"),
      step06: document.getElementById("step-06"),

      btnNhapTiec: document.getElementById("btn-nhap-tiec"),
      dropZone: document.getElementById("drop-zone"),
      fileInput: document.getElementById("file-input"),
      imagePreview: document.getElementById("image-preview"),
      placeholder: document.getElementById("placeholder"),
      confirmCheckbox: document.getElementById("confirm-checkbox"),
      uploadButton: document.getElementById("upload-button"),
      btnTryAgain: document.getElementById("btn-try-again"),

      step5Loading: document.getElementById("step5-loading"),
      loadingImagePreview: document.getElementById("loading-image-preview"),

      resultVideo: document.getElementById("result-video"),
      resultImage: document.getElementById("result-image"),
      // resultImageEl: <img> thực sự bên trong Elementor widget #result-image
      // Elementor render: #result-image > .elementor-widget-container > img
      get resultImageEl() {
        return document.querySelector("#result-image .elementor-widget-container img") ||
          document.querySelector("#result-image img");
      },
      btnDownload: document.getElementById("btn-download"),
      btnShare: document.getElementById("btn-share"),
      btnGetVideo: document.getElementById("btn-get-video"),
      videoStatusHint: document.getElementById("video-status-hint"),
      imgPersonality: document.getElementById("img-personality"),

      btnOver18: document.getElementById("btn-over-18"),
      btnCloseZaloPopup: document.getElementById("btn-close-pop-up-zalo"),
      intro: document.getElementById("intro"),
    };


    /* ============================================================
       2b. INTRO CONFIG
    ============================================================ */
    const INTRO_DURATION_MS = 10000;     // Tổng thời gian intro hiển thị (10s)
    const INTRO_SLIDE_MS = 1500;      // Mỗi nhân vật ở trung tâm bao lâu (1.5s)
    const INTRO_BASE_URL = "https://biatuoi-halida.com/wp-content/uploads/sites/2/2026/05/";
    // BW_0 → BW_5: đồng bộ với personality index từ n8n/PHP
    // 0=Vua tửu lượng, 1=DSDM, 2=DCBN, 3=BDN, 4=BTNG, 5=LPBN
    const INTRO_IMAGES = [
      INTRO_BASE_URL + "BW_0.webp",
      INTRO_BASE_URL + "BW_1.webp",
      INTRO_BASE_URL + "BW_2.webp",
      INTRO_BASE_URL + "BW_3.webp",
      INTRO_BASE_URL + "BW_4.webp",
      INTRO_BASE_URL + "BW_5.webp",
    ];

    /* Helper: lấy BW URL theo personality index */
    function getBwImageByPersonality(personality) {
      const idx = parseInt(personality, 10);
      if (Number.isInteger(idx) && idx >= 0 && idx < INTRO_IMAGES.length) {
        return INTRO_IMAGES[idx];
      }
      return null;
    }
    const INTRO_CAPTION_LINE_1 = "Trên bàn bia thường có các Anh Tài này,";
    const INTRO_CAPTION_LINE_2 = "cùng chờ xem bạn là Anh Tài nào?";


    /* ============================================================
       3. APPLICATION STATE
    ============================================================ */
    let state = {
      selectedFile: null,
      imageJobId: null,
      videoJobId: null,
      imageResult: null,
      videoUrl: null,
      currentVideoUrl: "",
      transitioning: false,
      downloadMode: "image",   // "image" | "video" — quyết định btn-download tải gì
      videoLoadingAnimInterval: null,
    };

    async function getFreshNonce() {
      try {
        const res = await fetch('/wp-json/faceswap/v1/token');
        if (!res.ok) return window.LH_FACESWAP_NONCE || '';
        const data = await res.json();
        window.LH_FACESWAP_NONCE = data.token; // also update the cached value
        return data.token;
      } catch {
        return window.LH_FACESWAP_NONCE || '';
      }
    }

    // ================== FILE SIZE LIMIT (20MB) ==================
    const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB - đồng bộ với backend

    /* ============================================================
       4. STEP TRANSITION ENGINE
       switchToStep(targetId, direction?)
         direction: "forward" (default) | "back"
       - Fades out the currently active step
       - Fades in the target step with a subtle slide
    ============================================================ */
    const ALL_STEP_IDS = ["step-02", "step-03", "step-04", "step-05", "step-06"];

    function initStepStyles() {
      ALL_STEP_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add("step-managed");
        // Keep original display mode (flex) stored so we can restore it
        el.dataset.displayMode = el.style.display || "flex";
        el.style.display = "none";
      });
    }

    function switchToStep(targetId, direction = "forward") {
      if (state.transitioning) return;

      const targetEl = document.getElementById(targetId);
      if (!targetEl) return;

      // Tự động ẩn banner từ step-03 trở đi và đổi background
      const bannerEl = document.getElementById("banner");
      if (["step-03", "step-04", "step-05", "step-06"].includes(targetId)) {
        if (bannerEl) bannerEl.style.display = "none";
        document.body.classList.add("bg-step-3-active");
      } else {
        if (bannerEl) bannerEl.style.display = ""; // Khôi phục display mặc định nếu quay lại step-02
        document.body.classList.remove("bg-step-3-active");
      }

      // Find currently visible step
      const currentEl = ALL_STEP_IDS
        .map(id => document.getElementById(id))
        .find(el => el && el.style.display !== "none" && el !== targetEl);

      // Determine slide direction class
      const enterClass = direction === "back" ? "step-from-above" : "step-from-below";

      state.transitioning = true;

      function showTarget() {
        // Prep target: position off-screen (below or above), make visible but transparent
        targetEl.classList.add(enterClass);
        targetEl.classList.remove("step-active");
        targetEl.style.display = targetEl.dataset.displayMode || "flex";

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            targetEl.classList.remove(enterClass);
            targetEl.classList.add("step-active");

            // Unlock after transition completes (with fallback for mobile Safari)
            let fired = false;
            const unlock = () => {
              if (fired) return;
              fired = true;
              state.transitioning = false;
            };
            targetEl.addEventListener("transitionend", unlock, { once: true });
            setTimeout(unlock, 450); // fallback
          });
        });
      }

      if (currentEl) {
        // Fade out current step
        currentEl.classList.remove("step-active");
        let fired = false;
        const hideCurrent = () => {
          if (fired) return;
          fired = true;
          currentEl.style.display = "none";
          showTarget();
        };
        currentEl.addEventListener("transitionend", hideCurrent, { once: true });
        setTimeout(hideCurrent, 450); // fallback
      } else {
        // No current step — just show target directly
        showTarget();
      }
    }

    /* Convenience: show one step instantly (for initial load) */
    function showStepInstant(targetId) {
      ALL_STEP_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = "none";
        el.classList.remove("step-active");
      });
      const targetEl = document.getElementById(targetId);
      if (!targetEl) return;

      // Logic ẩn/hiện banner và đổi background
      const bannerEl = document.getElementById("banner");
      if (["step-03", "step-04", "step-05", "step-06"].includes(targetId)) {
        if (bannerEl) bannerEl.style.display = "none";
        document.body.classList.add("bg-step-3-active");
      } else {
        if (bannerEl) bannerEl.style.display = "";
        document.body.classList.remove("bg-step-3-active");
      }

      targetEl.style.display = targetEl.dataset.displayMode || "flex";
      // Small rAF so the element paints before adding active class
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          targetEl.classList.add("step-active");
        });
      });
    }


    /* ============================================================
       4b. INTRO COVERFLOW ENGINE
    ============================================================ */
    let introTimer = null;
    let introCleanup = null;

    function buildIntroDOM() {
      // Trả về element #intro đã tồn tại, hoặc tạo mới và inject vào body
      let intro = document.getElementById("intro");
      if (intro && intro.querySelector(".intro-stage")) return intro;

      // Nếu đã có #intro (do Elementor render placeholder rỗng) thì xóa hết bên trong
      if (intro) intro.innerHTML = "";
      else {
        intro = document.createElement("div");
        intro.id = "intro";
        // Inject vào trước step-05 để giữ thứ tự DOM hợp lý
        const step05 = document.getElementById("step-05");
        if (step05 && step05.parentNode) {
          step05.parentNode.insertBefore(intro, step05);
        } else {
          document.body.appendChild(intro);
        }
      }

      const stage = document.createElement("div");
      stage.className = "intro-stage";

      INTRO_IMAGES.forEach((src, idx) => {
        const card = document.createElement("div");
        card.className = "intro-card pos-hidden";
        card.dataset.index = String(idx);
        const img = document.createElement("img");
        img.src = src;
        img.alt = `Anh Tài ${idx + 1}`;
        img.loading = "eager";
        img.decoding = "async";
        card.appendChild(img);
        stage.appendChild(card);
      });

      const caption = document.createElement("div");
      caption.className = "intro-caption";
      caption.innerHTML = `
        <span class="intro-line-1">${INTRO_CAPTION_LINE_1}</span>
        <span class="intro-line-2">${INTRO_CAPTION_LINE_2}</span>
      `;

      intro.appendChild(stage);
      intro.appendChild(caption);
      return intro;
    }

    function applyCoverflowPositions(cards, centerIdx) {
      const total = cards.length;
      cards.forEach((card, i) => {
        // Tính offset vòng tròn từ center
        let diff = i - centerIdx;
        // Wrap về [-floor(total/2), floor(total/2)]
        if (diff > total / 2) diff -= total;
        if (diff < -total / 2) diff += total;

        // Reset classes
        card.classList.remove(
          "pos-center", "pos-left-1", "pos-right-1",
          "pos-left-2", "pos-right-2", "pos-hidden"
        );
        if (diff === 0) card.classList.add("pos-center");
        else if (diff === -1) card.classList.add("pos-left-1");
        else if (diff === 1) card.classList.add("pos-right-1");
        else if (diff === -2) card.classList.add("pos-left-2");
        else if (diff === 2) card.classList.add("pos-right-2");
        else card.classList.add("pos-hidden");
      });
    }

    function runIntroAnimation() {
      // Trả về Promise resolve sau INTRO_DURATION_MS, không hủy nửa chừng
      return new Promise(resolve => {
        // Ẩn banner + áp bg như các step sau step-02
        const bannerEl = document.getElementById("banner");
        if (bannerEl) bannerEl.style.display = "none";
        document.body.classList.add("bg-step-3-active");

        // Build DOM intro TRƯỚC (chưa hiện)
        const intro = buildIntroDOM();
        const cards = Array.from(intro.querySelectorAll(".intro-card"));
        let currentIdx = 0;
        applyCoverflowPositions(cards, currentIdx);

        // ── CROSS-FADE step-03 → intro ──
        const step03 = document.getElementById("step-03");

        // Frame 1: bật display intro (chưa active) + thêm class fade-out cho step-03
        intro.classList.remove("intro-active");
        intro.classList.add("intro-ready");
        if (step03) step03.classList.add("step-fading-out");

        // Frame 2 (sau rAF kép): kích hoạt slide-in intro (song song với step-03 fade-out)
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            intro.classList.add("intro-active");
          });
        });

        // Sau khi step-03 fade xong (~500ms) → ẩn hẳn để không chặn click
        setTimeout(() => {
          if (step03) {
            step03.style.display = "none";
            step03.classList.remove("step-active", "step-fading-out");
          }
        }, 550);

        // Slideshow advance
        introTimer = setInterval(() => {
          currentIdx = (currentIdx + 1) % cards.length;
          applyCoverflowPositions(cards, currentIdx);
        }, INTRO_SLIDE_MS);

        // Cleanup function — đảm bảo resolve và dừng timer
        let resolved = false;
        introCleanup = () => {
          if (resolved) return;
          resolved = true;
          if (introTimer) { clearInterval(introTimer); introTimer = null; }
          intro.classList.remove("intro-active");
          // Đợi fade-out 600ms rồi ẩn hẳn
          setTimeout(() => {
            intro.style.display = "none";
            intro.classList.remove("intro-ready");
            // Reset transform để lần chạy sau slide lại từ trái
            intro.style.transform = "";
            requestAnimationFrame(() => {
              intro.style.transform = "";
            });
            resolve();
          }, 650);
        };

        setTimeout(() => introCleanup && introCleanup(), INTRO_DURATION_MS);
      });
    }

    function hideIntroImmediately() {

    /* ============================================================
       6. BUTTON STATE UTILITY
       setButtonState(btn, 'loading' | 'disabled' | 'enabled' | 'success', label?)
    ============================================================ */
    function setButtonState(btn, stateType, label) {
      if (!btn) return;
      switch (stateType) {
        case "loading":
          btn.disabled = true;
          btn.style.opacity = "0.7";
          btn.style.cursor = "wait";
          if (label) btn.innerHTML = label;
          break;
        case "disabled":
          btn.disabled = true;
          btn.style.opacity = "";
          btn.style.cursor = "";
          if (label) btn.innerHTML = label;
          break;
        case "enabled":
          btn.disabled = false;
          btn.style.opacity = "";
          btn.style.cursor = "";
          if (label) btn.innerHTML = label;
          break;
        case "success":
          btn.disabled = true;
          btn.style.opacity = "0.6";
          btn.style.cursor = "default";
          if (label) btn.innerHTML = label;
          break;
      }
    }


    /* ============================================================
       VIDEO LOADING TEXT ANIMATION

    /* ============================================================
       IMAGE RESIZE — Nén ảnh xuống max 1024px trước khi upload
       - Giữ tỉ lệ gốc (không méo ảnh)
       - Nếu ảnh đã nhỏ hơn 1024px → vẫn re-encode để giảm dung lượng
       - Output: JPEG quality 0.85 (PNG có alpha → nền trắng)
       - HEIC/HEIF: nếu browser không decode được → fallback gửi file gốc
    ============================================================ */
    const MAX_DIMENSION = 1024;
    const JPEG_QUALITY = 0.85;

    function resizeImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);

        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          let { width, height } = img;

          const needsResize = width > MAX_DIMENSION || height > MAX_DIMENSION;
          if (needsResize) {
            const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }

          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");

          // Nền trắng cho ảnh có alpha (PNG → JPEG)
          ctx.fillStyle = "#FFFFFF";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);

          canvas.toBlob(
            (blob) => {
              clearTimeout(blobTimeout);
              if (!blob) { resolve(file); return; }
              const originalName = file.name.replace(/\.[^/.]+$/, "");
              resolve(new File([blob], `${originalName}.jpg`, {
                type: "image/jpeg",
                lastModified: Date.now(),
              }));
            },
            "image/jpeg",
            JPEG_QUALITY
          );
          // Fallback: nếu canvas.toBlob() không có callback trong 8s (thiếu RAM trên mobile cũ)
          const blobTimeout = setTimeout(() => {
            console.warn("[Resize] canvas.toBlob() timeout, fallback to original file");
            resolve(file);
          }, 8000);
        };

        img.onerror = () => {
          // HEIC trên Chrome/Firefox không decode được → gửi file gốc
          URL.revokeObjectURL(objectUrl);
          console.warn("[Resize] Không decode được ảnh, gửi file gốc:", file.name);
          resolve(file);
        };

        img.src = objectUrl;
      });
    }

    async function handleFile(file) {
      if (!file) return;

      // === 1. KIỂM TRA DUNG LƯỢNG ===
      if (file.size > MAX_FILE_SIZE) {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
        alert(`❌ File quá lớn!\n\nDung lượng file: ${sizeMB} MB\nGiới hạn tối đa: 20 MB\n\nVui lòng chọn file nhỏ hơn.`);
        if (DOM.fileInput) DOM.fileInput.value = "";
        return;
      }

      // === 2. KIỂM TRA ĐỊNH DẠNG ===
      // iOS Safari đôi khi gửi file.type = "" với HEIC/HEIF → không reject, cho resize thử
      const fileType = file.type || "image/jpeg";
      if (!fileType.startsWith("image/") && !fileType.startsWith("application/octet-stream")) {
        alert("Vui lòng chọn file hình ảnh!");
        if (DOM.fileInput) DOM.fileInput.value = "";
        return;
      }

      // === 3. RESIZE XUỐNG MAX 1024px (giữ tỉ lệ) ===
      if (DOM.placeholder) DOM.placeholder.style.opacity = "0.5";

      let processedFile;
      try {
        processedFile = await resizeImage(file);
        console.log(
          `[Resize] ${file.name}: ${(file.size / 1024).toFixed(0)}KB → ${(processedFile.size / 1024).toFixed(0)}KB`
        );
      } catch (err) {
        console.error("[Resize] Error:", err);
        processedFile = file;
      } finally {
        if (DOM.placeholder) DOM.placeholder.style.opacity = "";
      }

      // File hợp lệ — lưu file đã nén
      state.selectedFile = processedFile;
      const reader = new FileReader();
      reader.onload = e => {
        if (DOM.placeholder) DOM.placeholder.style.display = "none";
        if (DOM.imagePreview) {
          DOM.imagePreview.src = e.target.result;
          DOM.imagePreview.style.display = "block";
          void DOM.imagePreview.offsetWidth;
          DOM.imagePreview.style.opacity = "1";
        }
      };
      reader.readAsDataURL(processedFile);
      syncUploadButton();
    }

    function syncUploadButton() {
      const ready = !!(state.selectedFile && DOM.confirmCheckbox?.checked);
      if (DOM.uploadButton) DOM.uploadButton.disabled = !ready;
    }

    function resetUploadForm() {
      state.selectedFile = null;
      state.imageJobId = null;
      state.videoJobId = null;
      state.imageResult = null;
      state.videoUrl = null;

      stopVideoLoadingAnimation();  // Dừng animation khi reset
      if (DOM.btnGetVideo) DOM.btnGetVideo.textContent = "VIDEO ĐANG TẠO...";
      if (DOM.videoStatusHint) { DOM.videoStatusHint.textContent = ""; DOM.videoStatusHint.style.display = ""; }
      if (DOM.resultVideo) DOM.resultVideo.classList.remove("video-section-hidden");
      if (DOM.resultImage) {
        DOM.resultImage.classList.remove("visible");
        // Clear img src bên trong widget
        const imgEl = DOM.resultImageEl;
        if (imgEl) imgEl.src = "";
        // Dọn overlay BW (nếu còn sót — có thể có nhiều do bug cũ)
        DOM.resultImage.querySelectorAll(".bw-reveal-overlay").forEach(el => el.remove());
      }
      if (DOM.fileInput) {
        DOM.fileInput.value = "";
        DOM.fileInput.style.pointerEvents = "auto";
      }
      if (DOM.placeholder) DOM.placeholder.style.display = "flex";
      if (DOM.imagePreview) {
        DOM.imagePreview.style.display = "none";

        DOM.imagePreview.style.opacity = "";
      }
      if (DOM.confirmCheckbox) DOM.confirmCheckbox.checked = false;

      if (DOM.loadingImagePreview) DOM.loadingImagePreview.classList.remove("is-loading");

    function cloneFormData(original) {
      const cloned = new FormData();
      for (const [key, value] of original.entries()) cloned.append(key, value);
      return cloned;
    }

    if (DOM.dropZone) {
      DOM.fileInput.addEventListener("change", e => {

      });
      DOM.dropZone.addEventListener("dragover", e => { e.preventDefault(); DOM.dropZone.classList.add("dragover"); });
      DOM.dropZone.addEventListener("dragleave", () => DOM.dropZone.classList.remove("dragover"));
      DOM.dropZone.addEventListener("drop", e => {
        e.preventDefault();
        DOM.dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });

    if (DOM.confirmCheckbox) DOM.confirmCheckbox.addEventListener("change", syncUploadButton);

    /* ============================================================
       9. STEP-06 RESULT FUNCTIONS (v2.0 — Dual-Job Parallel)
    ============================================================ */

    // Called as soon as the IMAGE job finishes — switches to step-06 immediately
    function showQuickImageResult(result) {
      if (!result) return;
      state.imageResult = result;

      // Personality image
      if (result["img-personality"] && DOM.imgPersonality) {
        DOM.imgPersonality.src = result["img-personality"];
        DOM.imgPersonality.srcset = "";
      }

      // Show preview image — ưu tiên image_url/preview_url, fallback img-personality
      const previewSrc = result.image_url || result.preview_url || result["img-personality"] || "";
      if (previewSrc && DOM.resultImage) {
        const imgEl = DOM.resultImageEl;

        // ── BW REVEAL EFFECT ────────────────────────────────────────
        // 1. Lấy BW URL theo personality từ n8n (số 0-5)
        // 2. Inject overlay BW vào #result-image
        // 3. Set ảnh kết quả thật vào <img> gốc (nằm dưới overlay)
        // 4. Fade-in BW (~400ms) → hold 1.2s → fade-out BW (~900ms) → lộ ảnh thật
        const bwUrl = getBwImageByPersonality(result.personality);

        if (imgEl) {
          imgEl.src = previewSrc;
          imgEl.srcset = "";
          imgEl.removeAttribute("srcset");
          imgEl.removeAttribute("sizes");
        }

        // Dọn overlay cũ (trường hợp user chạy lại flow trong cùng session)
        const oldOverlay = DOM.resultImage.querySelector(".bw-reveal-overlay");
        if (oldOverlay) oldOverlay.remove();

        // Debug log để kiểm tra dữ liệu
        console.log("[BW reveal] personality:", result.personality, "→ BW URL:", bwUrl);

        if (bwUrl) {
          // Tạo overlay BW
          const overlay = document.createElement("div");
          overlay.className = "bw-reveal-overlay";
          const bwImg = document.createElement("img");
          bwImg.src = bwUrl;
          bwImg.alt = "Anh Tài " + result.personality;
          bwImg.loading = "eager";
          bwImg.decoding = "async";
          // Log lỗi load để debug
          bwImg.onerror = () => console.warn("[BW reveal] Không load được:", bwUrl);
          bwImg.onload = () => console.log("[BW reveal] Đã load BW:", bwUrl);
          overlay.appendChild(bwImg);

          // ── QUAN TRỌNG: inject vào TRONG .elementor-widget-container (cùng cấp với <img>) ──
          // Nếu không có .elementor-widget-container thì fallback append vào #result-image
          const container = DOM.resultImage.querySelector(".elementor-widget-container") || DOM.resultImage;
          container.appendChild(overlay);

          // Hiện #result-image
          DOM.resultImage.classList.add("visible");

          // Frame 1: fade-in BW (rAF kép để chắc chắn transition kích hoạt)
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              overlay.classList.add("bw-show");
            });
          });

          // Sau 2.0s (đủ thời gian user nhận diện silhouette) → fade-out BW
          setTimeout(() => {
            overlay.classList.add("bw-fade-out");
            overlay.classList.remove("bw-show");
            // Xóa khỏi DOM sau khi fade xong để không chặn click vào ảnh thật
            setTimeout(() => overlay.remove(), 1000);
          }, 2000);

        } else {
          // Không có personality → hiện ảnh thật ngay như cũ
          DOM.resultImage.classList.add("visible");
        }
      }

      // ── BACKWARD COMPAT (n8n cũ single-job) ──────────────────────────────────
      if (result.video_url && !state.videoUrl) {
        preloadVideoInBackground(result.video_url);
        if (DOM.videoStatusHint) {
          DOM.videoStatusHint.textContent = "Hoàn tất! Nhấn nút để xem video.";
        }
      } else {
        if (DOM.resultVideo) DOM.resultVideo.classList.add("video-section-hidden");
        if (DOM.btnGetVideo) {
          DOM.btnGetVideo.disabled = true;
        }
        startVideoLoadingAnimation();
        if (DOM.videoStatusHint) {
          DOM.videoStatusHint.textContent = "Ảnh preview sẵn sàng! Video đang được tạo nền...";
        }
      }

      // Stop loading pulse, transition to step-06
      if (DOM.loadingImagePreview) DOM.loadingImagePreview.classList.remove("is-loading");
      if (DOM.step5Loading) DOM.step5Loading.style.display = "none";

      // Đặt btn-download = "TẢI ẢNH" ngay khi bước vào step-06
      state.downloadMode = "image";
      if (DOM.btnDownload) {
        DOM.btnDownload.textContent = "TẢI ẢNH";
        DOM.btnDownload.disabled = false;
      }

      switchToStep("step-06");
    }

    // Called when VIDEO job finishes — preload in background, enable button
    function preloadVideoInBackground(videoUrl) {
      if (!videoUrl) return;
      state.videoUrl = videoUrl;
      state.currentVideoUrl = videoUrl;

      // Keep video section hidden until user clicks btn-get-video
      if (DOM.resultVideo) DOM.resultVideo.classList.add("video-section-hidden");

      const videoEl = DOM.resultVideo?.querySelector("video.elementor-video");
      if (videoEl) {
        videoEl.classList.add("video-hidden");
        videoEl.classList.remove("video-visible");
        videoEl.pause();
        videoEl.src = videoUrl;
        videoEl.currentTime = 0;
        videoEl.load();
      }

      // Enable the "Lấy Video" button once browser reports canplay or after 4s
      const enableBtn = () => {
        stopVideoLoadingAnimation();  // ← Dừng animation khi video sẵn sàng
        if (DOM.btnGetVideo) {
          DOM.btnGetVideo.disabled = false;
          DOM.btnGetVideo.textContent = "LẤY VIDEO ĐẦY ĐỦ";
          DOM.btnGetVideo.classList.add("video-ready");
        }
        if (DOM.videoStatusHint) {
          DOM.videoStatusHint.textContent = "Video đã sẵn sàng! Nhấn nút để xem.";
        }
      };

      if (videoEl) {
        videoEl.addEventListener("canplay", enableBtn, { once: true });
        setTimeout(enableBtn, 4000); // fallback
      } else {
        setTimeout(enableBtn, 4000);
      }
    }

    // Legacy fallback used when only a single video job is returned (backward-compat)
    function showStep06(result) {
      if (!result) return;
      if (result["img-personality"] && DOM.imgPersonality) {
        DOM.imgPersonality.src = result["img-personality"];
        DOM.imgPersonality.srcset = "";
      }
      if (result.video_url) {
        state.currentVideoUrl = result.video_url;
        const videoEl = DOM.resultVideo?.querySelector("video.elementor-video");
        if (videoEl) {
          videoEl.classList.add("video-hidden");
          videoEl.classList.remove("video-visible");
          videoEl.pause();
          videoEl.src = result.video_url;
          videoEl.currentTime = 0;
          videoEl.load();
          const reveal = () => {
            videoEl.classList.remove("video-hidden");
            videoEl.classList.add("video-visible");
          };
          videoEl.addEventListener("canplay", reveal, { once: true });
          setTimeout(reveal, 3000);
        }
      }
      if (DOM.loadingImagePreview) DOM.loadingImagePreview.classList.remove("is-loading");
      if (DOM.step5Loading) DOM.step5Loading.style.display = "none";
      switchToStep("step-06");
    }


    /* ============================================================
       10. MAIN UPLOAD FLOW (v2.0 — Dual-Job Parallel)
           POST 1: /check  → sync (~5s)
           POST 2: /swap   → trả image_job_id + video_job_id ngay (< 2s)
           POLL A: /status?job=image_job_id  mỗi 3s  → showQuickImageResult
           POLL B: /status?job=video_job_id  mỗi 5s  → preloadVideoInBackground
    ============================================================ */
    const PROXY_CHECK_URL = "/wp-json/faceswap/v1/check";
    const PROXY_SWAP_URL = "/wp-json/faceswap/v1/swap";
    const PROXY_STATUS_URL = "/wp-json/faceswap/v1/status";

    const IMAGE_POLL_MS = 3000;
    const VIDEO_POLL_MS = 5000;
    const POLL_MAX_WAIT_MS = 900000; // 15 min

    /* Generic poll — resolves when status === "done", rejects on error/timeout */
    function pollJobResult(jobId, intervalMs) {
      const startTime = Date.now();
      return new Promise((resolve, reject) => {
        async function tick() {
          if (Date.now() - startTime > POLL_MAX_WAIT_MS) {
            reject(new Error("Quá thời gian chờ (15 phút). Vui lòng thử lại."));
            return;
          }
          try {
            const res = await fetch(`${PROXY_STATUS_URL}?job=${encodeURIComponent(jobId)}`);
            if (res.status === 404) { reject(new Error("Job không tồn tại hoặc đã hết hạn.")); return; }
            if (!res.ok) { setTimeout(tick, intervalMs); return; }
            const data = await res.json();
            if (data.status === "done") { resolve(data); return; }
            if (data.status === "error") { reject(new Error(data.reason || "Xử lý thất bại.")); return; }
            setTimeout(tick, intervalMs);
          } catch { setTimeout(tick, intervalMs); }
        }
        tick();
      });
    }

    if (DOM.uploadButton) {
      DOM.uploadButton.addEventListener("click", async () => {
        if (!state.selectedFile) return;

        if (state.selectedFile.size > MAX_FILE_SIZE) {
          alert("❌ File quá lớn! Vui lòng chọn file dưới 20MB.");
          resetUploadForm();
          return;
        }

        setButtonState(DOM.uploadButton, "loading", "Đang kiểm tra...");

        const formData = new FormData();
        formData.append("file", state.selectedFile);
        formData.append("confirm", "1");

        try {
          /* ── Step 1: Check ảnh (sync) ── */
          const nonce = await getFreshNonce();

          // AbortController — timeout 70s để tránh fetch đứng vĩnh viễn trên mobile 4G yếu
          const checkAbort = new AbortController();
          const checkTimer = setTimeout(() => checkAbort.abort(), 70000);
          let checkRes;
          try {
            checkRes = await fetch(PROXY_CHECK_URL, {
              method: "POST",
              headers: { 'X-LH-Faceswap-Nonce': nonce },
              body: cloneFormData(formData),
              signal: checkAbort.signal,
            });
          } finally {
            clearTimeout(checkTimer);
          }
          if (!checkRes.ok) throw new Error(`Check server error: ${checkRes.status}`);
          let checkResult = await checkRes.json();
          if (Array.isArray(checkResult)) checkResult = checkResult[0];

          if (checkResult.success !== true) {
            alert("❌ " + (checkResult.reason || "Ảnh không phù hợp!"));
            resetUploadForm();
            switchToStep("step-04");
            return;
          }

          /* ── Step 2: Gửi swap NGAY (song song với intro animation) ── */
          // Swap chỉ cần ACK từ n8n (~5s), timeout 30s là đủ
          setButtonState(DOM.uploadButton, "loading", "Đang xử lý...");

          const swapAbort = new AbortController();
          const swapTimer = setTimeout(() => swapAbort.abort(), 30000);

          // Fire swap (Promise) — KHÔNG await ở đây, để intro animation chạy song song
          const swapPromise = (async () => {
            try {
              const swapRes = await fetch(PROXY_SWAP_URL, {
                method: "POST",
                headers: { 'X-LH-Faceswap-Nonce': nonce },
                body: formData,
                signal: swapAbort.signal,
              });
              if (!swapRes.ok) throw new Error(`Swap server error: ${swapRes.status}`);
              let swapInit = await swapRes.json();
              if (Array.isArray(swapInit)) swapInit = swapInit[0];
              return swapInit;
            } finally {
              clearTimeout(swapTimer);
            }
          })();

          /* ── Step 3: Hiển thị intro coverflow 10s (chạy song song với swap) ── */
          // runIntroAnimation() tự ẩn step-03 và hiện #intro với coverflow
          await runIntroAnimation();

          /* ── Step 4: Sau intro xong → chuyển step-05 (loading như cũ) ── */
          if (DOM.step5Loading) DOM.step5Loading.style.display = "block";
          if (DOM.loadingImagePreview && DOM.imagePreview?.src) {
            DOM.loadingImagePreview.src = DOM.imagePreview.src;
            DOM.loadingImagePreview.classList.add("is-loading");
          }
          switchToStep("step-05");

          /* ── Step 5: Đợi swap response (đã chạy nền từ trước) ── */
          const swapInit = await swapPromise;

          // Dual-job mode (v2.0)
          if (swapInit?.image_job_id && swapInit?.video_job_id) {
            state.imageJobId = swapInit.image_job_id;
            state.videoJobId = swapInit.video_job_id;

            /* ── Step 6A: Poll image (priority) — khi xong chuyển step-06 ngay ── */
            const imageResult = await pollJobResult(state.imageJobId, IMAGE_POLL_MS);
            showQuickImageResult(imageResult);

            /* ── Step 6B: Poll video (background, đã bắt đầu song song) ── */
            pollJobResult(state.videoJobId, VIDEO_POLL_MS)
              .then(videoResult => {
                if (videoResult.success && videoResult.video_url) {
                  preloadVideoInBackground(videoResult.video_url);
                }
              })
              .catch(err => {
                console.warn("[video poll] failed:", err.message);
                stopVideoLoadingAnimation();
                if (DOM.btnGetVideo) {
                  DOM.btnGetVideo.textContent = "VIDEO KHÔNG KHẢ DỤNG";
                }
                if (DOM.videoStatusHint) DOM.videoStatusHint.textContent = "Video không khả dụng.";
              });

            // Legacy single-job fallback (backward-compat with old n8n)
          } else if (swapInit?.job_id) {
            const swapResult = await pollJobResult(swapInit.job_id, VIDEO_POLL_MS);
            if (swapResult.success && swapResult.video_url) {
              showStep06(swapResult);
            } else {
              throw new Error(swapResult.reason || "Face swap thất bại – không có video_url.");
            }

          } else {
            throw new Error("Không nhận được job ID từ server.");
          }

        } catch (err) {
          console.error("Upload error:", err);
          hideIntroImmediately();   // ← THÊM DÒNG NÀY
          alert("❌ Có lỗi xảy ra. Vui lòng thử lại!\n" + err.message);
          resetUploadForm();
          if (DOM.step5Loading) DOM.step5Loading.style.display = "none";
          switchToStep("step-03", "back");

        } finally {
          setButtonState(DOM.uploadButton, "enabled", "TẢI ẢNH LÊN");
          syncUploadButton();
        }
      });
    }

    /* ── Nút "Lấy Video": hiện video section + autoplay ── */
    if (DOM.btnGetVideo) {
      DOM.btnGetVideo.addEventListener("click", () => {
        if (!state.videoUrl) return;

        // Ẩn ảnh preview để video không bị che khuất (cả 2 đều absolute)
        if (DOM.resultImage) DOM.resultImage.classList.remove("visible");

        // Chuyển btn-download sang chế độ video
        state.downloadMode = "video";
        if (DOM.btnDownload) DOM.btnDownload.textContent = "TẢI VIDEO";

        // Hiện video section
        if (DOM.resultVideo) {
          DOM.resultVideo.classList.remove("video-section-hidden");
          const videoEl = DOM.resultVideo.querySelector("video.elementor-video");
          if (videoEl) {
            videoEl.classList.remove("video-hidden");
            videoEl.classList.add("video-visible");
            videoEl.play().catch(() => { });
          }
        }

        // Ẩn nút + hint
        DOM.btnGetVideo.style.display = "none";
        if (DOM.videoStatusHint) DOM.videoStatusHint.style.display = "none";

        // Scroll mượt đến video
        DOM.resultVideo?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }



    /* ============================================================
       11. DOWNLOAD & SHARE (ĐÃ SỬA – CÓ QUOTE)
    ============================================================ */
    async function handleDownload() {
      const isImageMode = state.downloadMode === "image";
      const downloadUrl = isImageMode
        ? (state.imageResult?.image_url || state.imageResult?.preview_url || "")
        : state.currentVideoUrl;

      let ext = isImageMode ? "jpg" : "mp4";
      if (downloadUrl) {
        const match = downloadUrl.match(/\.([a-zA-Z0-9]+)(?:[\?#]|$)/);
        if (match) {
          ext = match[1].toLowerCase();
        }
      }
      const filename = isImageMode ? `TADAAAA-anh-cua-ban.${ext}` : `TADAAAA-video-cua-ban.${ext}`;

      if (!downloadUrl) {
        alert(isImageMode ? "❌ Chưa có ảnh để tải. Vui lòng thử lại!" : "❌ Chưa có video để tải. Vui lòng thử lại!");
        return;
      }

      setButtonState(DOM.btnDownload, "loading");
      try {
        const res = await fetch(downloadUrl, { method: "GET", mode: "cors" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement("a"), { href: blobUrl, download: filename });
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
      } catch (err) {
        console.error("Download error:", err);
        alert("❌ Không thể tải.\nLỗi: " + err.message);
      } finally {
        setButtonState(DOM.btnDownload, "enabled", isImageMode ? "TẢI ẢNH" : "TẢI VIDEO");
      }
    }

    // ================== SHARE FACEBOOK — SDK VERSION ==================
    function handleShare() {
      const shareUrl = "https://biatuoi-halida.com/";
      const quoteText = "Ae vô đây check var thử coi mình có tài năng tiềm ẩn gì trên bàn nhậu không, xong gửi kết quả cho tui. Đủ đội hình mình lập hội đi Tiệc Vui Muôn Vẻ luôn nha 😂";
      const hashtag = "#BiaTuoiHalida";

      // Ưu tiên dùng Facebook SDK
      if (window.FB && typeof window.FB.ui === "function") {
        FB.ui(
          {
            method: "share",
            href: shareUrl,
            quote: quoteText,
            hashtag: hashtag,
            mobile_iframe: true
          },
          function (response) {
            console.log("Facebook share response:", response);
          }
        );
        return;
      }

      // Fallback nếu SDK chưa load kịp
      const appId = "991207586610170";
      const redirectUri = window.location.href;

      const fbShareUrl =
        `https://www.facebook.com/dialog/share` +
        `?app_id=${encodeURIComponent(appId)}` +
        `&display=popup` +
        `&href=${encodeURIComponent(shareUrl)}` +
        `&quote=${encodeURIComponent(quoteText)}` +
        `&hashtag=${encodeURIComponent(hashtag)}` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}`;

      window.open(
        fbShareUrl,
        "fb-share",
        "width=600,height=700,scrollbars=yes,resizable=yes"
      );
    }

    if (DOM.btnDownload) DOM.btnDownload.addEventListener("click", handleDownload);
    if (DOM.btnShare) DOM.btnShare.addEventListener("click", handleShare);


    /* ============================================================
       12. PHONE FORM SUBMISSION (reusable for both inline & popup)
    ============================================================ */
    const PHONE_WEBHOOK_URL = "/wp-json/faceswap/v1/phone";   // ← proxy
    const VN_PHONE_REGEX = /^(0|84|\+84)[35789][0-9]{8}$/;

    function setupPhoneSubmission(btnId, inputId, messageId) {
      const btnSend = document.getElementById(btnId);
      const phoneInput = document.getElementById(inputId);
      const phoneMessage = document.getElementById(messageId);
      if (!btnSend || !phoneInput || !phoneMessage) return;

      function showMsg(msg, type = "error") {
        phoneMessage.textContent = msg;
        phoneMessage.style.color = type === "success" ? "#28a745" : "#d9534f";
        if (type === "error") {
          setTimeout(() => {
            if (phoneMessage.textContent === msg) phoneMessage.textContent = "";
          }, 6000);
        }
      }

      btnSend.addEventListener("click", async e => {
        e.preventDefault();
        const raw = phoneInput.value.trim().replace(/\s+/g, "");
        if (!raw) { showMsg("Vui lòng nhập số điện thoại!"); phoneInput.focus(); return; }
        if (!VN_PHONE_REGEX.test(raw)) {
          showMsg("Số điện thoại không hợp lệ! Vui lòng nhập đúng số di động.");
          phoneInput.focus();
          return;
        }

        const formatted = raw.replace(/^(\+?84)/, "0");
        const origLabel = btnSend.innerHTML;
        setButtonState(btnSend, "loading", `<span class="spinner-border spinner-border-sm" role="status"></span> Đang gửi...`);

        const formData = new FormData();
        formData.append("phone", formatted);
        formData.append("source", btnId === "btn-send-2" ? "tadadaa_video_popup" : "tadadaa_video_form");
        formData.append("confirm", "1");
        if (state.currentVideoUrl) formData.append("video_url", state.currentVideoUrl);

        try {
          const nonce = await getFreshNonce();
          const res = await fetch(PHONE_WEBHOOK_URL, {
            method: "POST",
            headers: {
              'X-LH-Faceswap-Nonce': nonce
            },
            body: formData
          });
          let result = await res.json();
          if (Array.isArray(result)) result = result[0];

          if (result?.status === "success" || result?.success === true) {
            showMsg("✅ Gửi thành công! Quà tặng sẽ được gửi qua Zalo trong vài phút.", "success");
            phoneInput.disabled = true;
            setButtonState(btnSend, "success", "THÀNH CÔNG");
          } else if (result?.status === "error") {
            showMsg(`❌ ${result.message || result.reason || "Gửi thất bại"}`);
            setButtonState(btnSend, "enabled", origLabel);
          } else {
            throw new Error(result?.message || result?.reason || "Phản hồi không xác định");
          }
        } catch (err) {
          console.error("Phone submit error:", err);
          showMsg("❌ Có lỗi xảy ra khi gửi. Vui lòng thử lại sau!");
          setButtonState(btnSend, "enabled", origLabel);
        }
      });
    }

    setupPhoneSubmission("btn-send", "phone-input", "phone-message");


    /* ============================================================
       13. AGE GATE & ZALO POPUP
    ============================================================ */
    if (DOM.btnOver18) {
      DOM.btnOver18.addEventListener("click", () => document.body.classList.add("age-verified"));
    }

    if (typeof jQuery !== "undefined") {
      jQuery(document).on("elementor/popup/hide", (event, id) => {
        if (id === 1487) document.body.classList.add("age-verified");
      });

      jQuery(document).on("elementor/popup/show", (event, id) => {
        if (id === 2302) {
          // Small delay to let popup DOM fully render before querying its children
          setTimeout(() => setupPhoneSubmission("btn-send-2", "phone-input-2", "phone-message-2"), 400);
        }
      });
    }

    if (DOM.btnCloseZaloPopup) {
      DOM.btnCloseZaloPopup.addEventListener("click", () => {
        if (typeof elementorFrontend !== "undefined") {
          elementorFrontend.elements.$body.trigger("elementor/popup/hide", [2302]);
        } else {
          const popup = document.querySelector('[data-elementor-id="2302"]');
          if (popup) popup.style.display = "none";
        }
      });
    }

  }); // end DOMContentLoaded
</script>
